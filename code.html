<!DOCTYPE html>
<html>
<head>
  <title>.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #000;
    }

    input {
      background: none;
      border: none;
      border-bottom: 1px solid #333;
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      padding: 8px;
      width: 160px;
      outline: none;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }

    input:focus { border-bottom-color: #fff; }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 36px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    #msg {
      margin-top: 20px;
      color: #555;
      font-size: 0.75rem;
      font-family: sans-serif;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <input id="code" type="password" autocomplete="off" />
  <button onclick="check()">GO</button>
  <p id="msg"></p>

  <script>
    async function check() {
      const input = document.getElementById('code').value;
      const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
      const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (hex === 'dc1b0e0234587d7165e490b61fea8bb928c927da03dc61780659ad00fa2af354') {
        window.location.href = '/math.html';
      } else {
        document.getElementById('msg').textContent = 'WRONG';
      }
    }

    document.getElementById('code').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
