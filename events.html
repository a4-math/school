<script>
// ── Clock & Date ──────────────────────────────────────────
function pad(n) { return String(n).padStart(2,"0"); }

function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  document.getElementById("clock").textContent = `${pad(h)}:${pad(m)}:${pad(s)} ${ampm}`;
}

function setDate() {
  const now = new Date();
  document.getElementById("date-display").textContent = now.toLocaleDateString("en-US", {
    weekday:"long", month:"long", day:"numeric", year:"numeric"
  });
}

setDate();
updateClock();
setInterval(updateClock, 1000);

// ── Weather (Open-Meteo, no key needed) ──────────────────
async function loadWeather() {
  try {
    // 37037 = Eagleville, TN coords
    const lat = 35.7215, lon = -86.6486;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FChicago`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;

    const wmoDesc = {
      0:"Clear Sky",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",
      45:"Foggy",48:"Icy Fog",
      51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",
      61:"Light Rain",63:"Rain",65:"Heavy Rain",
      71:"Light Snow",73:"Snow",75:"Heavy Snow",77:"Snow Grains",
      80:"Rain Showers",81:"Rain Showers",82:"Violent Showers",
      85:"Snow Showers",86:"Heavy Snow Showers",
      95:"Thunderstorm",96:"Thunderstorm w/ Hail",99:"Thunderstorm w/ Heavy Hail"
    };

    const wmoIcon = {
      0:"fa-sun",1:"fa-sun",2:"fa-cloud-sun",3:"fa-cloud",
      45:"fa-smog",48:"fa-smog",
      51:"fa-cloud-drizzle",53:"fa-cloud-drizzle",55:"fa-cloud-drizzle",
      61:"fa-cloud-rain",63:"fa-cloud-rain",65:"fa-cloud-showers-heavy",
      71:"fa-snowflake",73:"fa-snowflake",75:"fa-snowflake",77:"fa-snowflake",
      80:"fa-cloud-showers-heavy",81:"fa-cloud-showers-heavy",82:"fa-cloud-showers-heavy",
      85:"fa-snowflake",86:"fa-snowflake",
      95:"fa-bolt",96:"fa-bolt",99:"fa-bolt"
    };

    const code = c.weathercode;
    const desc = wmoDesc[code] || "Unknown";
    const icon = wmoIcon[code] || "fa-cloud";
    const temp = Math.round(c.temperature_2m);
    const feels = Math.round(c.apparent_temperature);
    const wind = Math.round(c.windspeed_10m);
    const humidity = c.relativehumidity_2m;

    document.getElementById("weather-content").innerHTML = `
      <div class="weather-row">
        <i class="fa-solid ${icon}" style="font-size:42px;color:#f59e0b;"></i>
        <div class="weather-temp">${temp}°F</div>
        <div class="weather-info">
          ${desc}<br>
          Feels like ${feels}°F<br>
          Wind ${wind} mph · Humidity ${humidity}%
        </div>
      </div>`;
  } catch(e) {
    document.getElementById("weather-content").innerHTML = `<div class="weather-error">Unable to load weather.</div>`;
  }
}

loadWeather();

function getTodayEvents() {
  const now = new Date();
  now.setHours(0,0,0,0);
  const todayStr = now.toISOString().slice(0,10);

  const results = [];
  const seen = new Set();
  for (const ev of EVENTS) {
    const start = new Date(ev.date + "T00:00:00");
    const end = ev.end ? new Date(ev.end + "T00:00:00") : start;
    if (now >= start && now <= end && !seen.has(ev.text)) {
      results.push(ev);
      seen.add(ev.text);
    }
  }
  return results;
}

const todayEvs = getTodayEvents();
const list = document.getElementById("events-list");
if (!todayEvs.length) {
  list.innerHTML = `<div class="no-events">No events today.</div>`;
} else {
  list.innerHTML = todayEvs.map(e =>
    `<div class="event${e.noschool?" no-school":""}">
